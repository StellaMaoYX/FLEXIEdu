<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sentence Ordering Activity</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #eef2ff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding-bottom: 30px;
    }

    /* ── Waiting screen ── */
    #waitingScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #888;
      text-align: center;
      padding: 40px;
    }
    #waitingScreen .wait-icon { font-size: 4rem; margin-bottom: 16px; }
    #waitingScreen .wait-msg  { font-size: 1.4rem; }

    #activityScreen { display: none; }

    /* ── Header ── */
    .activity-header {
      text-align: center;
      padding: 24px 20px 12px;
    }
    .activity-title {
      font-size: 2rem;
      font-weight: bold;
      color: #1a56a0;
      margin-bottom: 6px;
    }
    .activity-instruction {
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 10px;
    }
    .level-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 14px;
      background: #1a56a0;
      color: white;
      font-size: 0.85rem;
      font-weight: bold;
    }

    /* ── Answer zone ── */
    .answer-zone {
      max-width: 900px;
      margin: 16px auto 8px;
      padding: 0 16px;
    }
    .zone-label {
      font-size: 0.78rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      margin-bottom: 8px;
    }
    .answer-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: stretch;
      background: white;
      border: 2px dashed #9dbcf5;
      border-radius: 16px;
      padding: 14px 16px;
      min-height: 80px;
    }
    .answer-slots.drag-over-zone {
      border-color: #1a56a0;
      background: #f0f5ff;
    }

    .answer-slot {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      min-height: 62px;
      border: 2px dashed #c5d5f0;
      border-radius: 12px;
      padding: 6px 10px;
      background: #f7f9ff;
      transition: border-color 0.15s, background 0.15s;
    }
    .answer-slot.drag-over {
      border-color: #1a56a0;
      background: #ddeaff;
      transform: scale(1.03);
    }
    .answer-slot.filled {
      border-style: solid;
      border-color: #1a56a0;
      background: white;
      cursor: pointer;
    }
    .answer-slot.filled:hover {
      border-color: #e74c3c;
      background: #fff5f5;
    }
    .slot-num {
      font-size: 0.7rem;
      font-weight: bold;
      color: #bbb;
      position: absolute;
      top: 4px;
      left: 7px;
    }
    .slot-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding-top: 8px;
    }
    .slot-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: #1a1a2e;
      text-align: center;
      line-height: 1.3;
    }
    .slot-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 8px;
    }
    .slot-speak {
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 50%;
      color: #1a56a0;
      line-height: 1;
    }
    .slot-speak:hover { background: #e8f0ff; }
    .slot-empty-hint {
      color: #ccc;
      font-size: 1.4rem;
      user-select: none;
    }

    /* ── Word bank ── */
    .word-bank {
      max-width: 900px;
      margin: 16px auto 0;
      padding: 0 16px;
    }
    .bank-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      background: white;
      border: 2px solid #dde3f5;
      border-radius: 16px;
      padding: 16px;
      min-height: 80px;
    }
    .bank-items.drag-over-zone {
      border-color: #aaa;
      background: #f5f5f5;
    }
    .bank-empty-hint {
      color: #ccc;
      font-size: 1rem;
      font-style: italic;
    }

    .bank-bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a56a0;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 1.15rem;
      font-weight: 600;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.15s;
      box-shadow: 0 3px 8px rgba(26,86,160,.3);
    }
    .bank-bubble:active { cursor: grabbing; }
    .bank-bubble.dragging { opacity: 0.35; transform: scale(0.95); }
    .bank-bubble:hover { background: #154583; transform: translateY(-2px); box-shadow: 0 5px 14px rgba(26,86,160,.4); }

    .bubble-img {
      width: 38px;
      height: 38px;
      object-fit: cover;
      border-radius: 6px;
    }
    .bubble-speak {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      color: white;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .bubble-speak:hover { background: rgba(255,255,255,0.35); }

    /* ── Action bar ── */
    .action-bar {
      text-align: center;
      padding: 20px 16px 10px;
    }
    .check-btn {
      background: #1a56a0;
      color: white;
      border: none;
      border-radius: 34px;
      padding: 16px 56px;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(26,86,160,.35);
      transition: all 0.15s;
    }
    .check-btn:hover  { background: #154583; transform: translateY(-2px); }
    .check-btn:active { transform: translateY(0); }
    .check-btn:disabled { background: #aab; cursor: not-allowed; transform: none; box-shadow: none; }

    /* ── Feedback overlay ── */
    .feedback-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 900;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .feedback-overlay.show  { opacity: 1; pointer-events: all; }
    .overlay-correct { background: rgba(20,110,60,.88); }
    .overlay-stuck   { background: rgba(70,70,80,.88); }

    .feedback-card {
      background: white;
      border-radius: 24px;
      padding: 36px 48px;
      text-align: center;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,.3);
    }
    .fb-emoji { font-size: 4.5rem; margin-bottom: 12px; }
    .fb-title { font-size: 1.9rem; font-weight: bold; color: #222; margin-bottom: 8px; }
    .fb-sub   { font-size: 1.1rem; color: #555; margin-bottom: 24px; }
    .fb-btn {
      border: none; border-radius: 24px;
      padding: 13px 38px;
      font-size: 1.1rem; font-weight: bold;
      cursor: pointer; transition: all 0.15s;
    }
    .fb-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-continue { background: #1a56a0; color: white; }
    .btn-tryagain { background: #f39c12; color: white; }
    .fb-wait {
      font-size: 0.95rem;
      color: #888;
      margin-top: 4px;
      display: none;
    }
    @keyframes waitPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .fb-wait { animation: waitPulse 2s ease-in-out infinite; }

    /* ── Correct/incorrect flash on slots ── */
    .answer-slot.state-correct   { border-color: #1a7a4a !important; background: #eafaf1 !important; }
    .answer-slot.state-incorrect {
      border-color: #c0392b !important; background: #fdf2f2 !important;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @media (max-width: 600px) {
      .activity-title { font-size: 1.5rem; }
      .activity-instruction { font-size: 1.1rem; }
      .bank-bubble { font-size: 1rem; padding: 8px 12px; }
      .check-btn { font-size: 1.2rem; padding: 14px 36px; }
      .feedback-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <div id="waitingScreen">
    <div class="wait-icon">⏳</div>
    <div class="wait-msg">Waiting for your teacher to start the activity…</div>
  </div>

  <div id="activityScreen">

    <div class="activity-header">
      <div class="activity-title" id="activityTitle"></div>
      <div class="activity-instruction" id="activityInstruction"></div>
      <span class="level-badge" id="levelBadge">Sentence</span>
    </div>

    <!-- Answer zone (drop targets) -->
    <div class="answer-zone">
      <div class="zone-label">Put them in order here ↓</div>
      <div class="answer-slots" id="answerSlots"></div>
    </div>

    <!-- Word bank (draggable bubbles) -->
    <div class="word-bank">
      <div class="zone-label">Word Bank — tap or drag a bubble up ↑</div>
      <div class="bank-items" id="bankItems"></div>
    </div>

    <div class="action-bar">
      <button class="check-btn" id="checkBtn" onclick="checkAnswer()" disabled>✓ Check Answer</button>
    </div>

  </div>

  <div class="feedback-overlay" id="feedbackOverlay">
    <div class="feedback-card">
      <div class="fb-emoji" id="fbEmoji"></div>
      <div class="fb-title" id="fbTitle"></div>
      <div class="fb-sub"   id="fbSub"></div>
      <button class="fb-btn" id="fbBtn" onclick="onFeedbackBtn()"></button>
      <div class="fb-wait" id="fbWait">⏳ Waiting for your teacher…</div>
    </div>
  </div>

  <script src="scripts/config.js"></script>
  <script src="../databasejs/scripts/database.js"></script>
  <script src="scripts/sentence-student.js"></script>
</body>
</html>
