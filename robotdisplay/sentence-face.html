<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentence Ordering – Robot Face</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Face is 16:9 landscape; Face.draw() sets the height via JS */
    #robotFace {
      width: 100%;
    }
    #faceSVG {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Sparkle overlay (correct state) ── */
    #sparkleLayer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: none;
    }
    .sparkle {
      position: absolute;
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      animation: sparkleRise var(--dur) ease-in-out var(--delay) infinite;
      transform-origin: center;
    }
    @keyframes sparkleRise {
      0%   { transform: translateY(0)    scale(0.8) rotate(0deg);   opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 0.9; }
      100% { transform: translateY(-90px) scale(1.3) rotate(360deg); opacity: 0; }
    }

    /* ── State label (bottom-centre) ── */
    #stateLabel {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.4);
      color: #fff;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      font-family: Arial, sans-serif;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="robotFace">
    <svg id="faceSVG"></svg>
  </div>

  <div id="sparkleLayer"></div>
  <div id="stateLabel">Waiting…</div>

  <script src="../databasejs/scripts/database.js"></script>
  <script src="scripts/config.js"></script>
  <script src="scripts/eyes.js"></script>
  <script src="scripts/face.js"></script>
  <script src="scripts/sentence-face.js"></script>
</body>
</html>
