<!DOCTYPE html>
<html lang="en"></html>
<head>
  <meta charset="utf-8">
  <title>EMAR Robot Frontend Tools</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <link rel="stylesheet" href="styles/style.processed.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left" id="topLeft"><a style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;background:#f1f5f9;border:1px solid #e2e8f0;color:#374151;font-size:0.95rem;font-weight:600;text-decoration:none;" href="#" onclick="history.back();return false;">href="index.html">&#8592; Back#8592; Back</a></div>
    <div class="topbar-right" id="top"></div>
  </div>
  <div class="container-fluid px-sm-5 pb-4">
    <div class="row">
      <div class="col text-center">
        <h1 class="display-4">Robot Setup</h1>
      </div>
    </div>
    <div class="row mb-2">
      <div class="col">
        <div class="card">
          <div class="card-header" id="headingFaces">
            <button class="btn btn-link btn-lg" type="button" data-toggle="collapse" data-target="#collapseAddAdmin" aria-expanded="true" aria-controls="collapseAddAdmin">List of admins</button>
          </div>
          <div class="collapse collapsed" aria-labelledby="headingFaces" id="collapseAddAdmin">
            <div class="card-body">
              <div class="mb-4" id="adminInfo"><span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row mb-2">
      <div class="col">
        <div class="card">
          <div class="card-header" id="newAdmin">
            <button class="btn btn-link btn-lg" type="button" data-toggle="collapse" data-target="#collapseNewAdmin" aria-expanded="true" aria-controls="collapseNewAdmin">Add new admin</button>
          </div>
          <div class="collapse collapsed" aria-labelledby="newAdmin" id="collapseNewAdmin">
            <div class="card-body">
              <div class="mb-2 mb-1" id="newAdmin">New administrator's email:
                <input class="large-text" type="text" name="adminEmail" id="adminEmail">
                <button class="btn btn-success" onclick="addNewAdmin()">Add New Admin</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row mb-2">
  <div class="col">
    <div class="card">
      <div class="card-header">
        <button class="btn btn-link btn-lg" type="button" data-toggle="collapse"
          data-target="#collapseIdEmail">
          Link Email to User ID
        </button>
      </div>

      <div class="collapse collapsed" id="collapseIdEmail">
        <div class="card-body">
          <div id="idEmailList" class="mb-3">
              Update or register your email to see the email list...
          </div>

          <div class="mb-2">
            User ID:
            <select id="userId">
              <option value="0">0</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
              <option value="13">13</option>
            </select>

            Gmail:
            <input class="large-text" type="email" id="linkedEmail">

            <button class="btn btn-success" onclick="saveIdEmail()">
              Save / Update
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
    <div class="row mb-2">
      <div class="col">
        <div class="card">
          <div class="card-header" id="headingSpeak">
            <button class="btn btn-link btn-lg" type="button" data-toggle="collapse" data-target="#collapseNewRobot" aria-expanded="true" aria-controls="collapseNewRobot">Create new robot</button>
          </div>
          <div class="collapse collapsed" aria-labelledby="headingSpeak" id="collapseNewRobot">
            <div class="card-body">
              <div class="mb-4" id="robotInfo"><span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span></div>
              <div class="mb-2 mb-1" id="newRobot">Name:
                <input class="large-text" type="text" name="robotName" id="robotName">
                <button class="btn btn-success" onclick="addNewRobot()">Create new robot</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  <script src="https://stellamaoyx.github.io/EMARRobotDuplicate/robotbackend/scripts/config.js"></script>
  <script src="https://stellamaoyx.github.io/EMARRobotDuplicate/databasejs/scripts/database.js"></script>
  <script src="scripts/admin.js"></script>
</body>
