<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" rx="32" fill="#e8f7f0"/>

  <!-- Glow behind robot -->
  <ellipse cx="200" cy="310" rx="90" ry="18" fill="#b2e8d0" opacity="0.6"/>

  <!-- Robot body -->
  <rect x="130" y="190" width="140" height="120" rx="20" fill="#4ecb8d"/>
  <rect x="130" y="190" width="140" height="120" rx="20" fill="none" stroke="#2a9d5c" stroke-width="3"/>

  <!-- Belly screen -->
  <rect x="152" y="210" width="96" height="68" rx="10" fill="#1a1a2e"/>
  <!-- Screen content: simple bar chart animation feel -->
  <rect x="162" y="255" width="14" height="18" rx="3" fill="#4ade80"/>
  <rect x="182" y="242" width="14" height="31" rx="3" fill="#34d399"/>
  <rect x="202" y="233" width="14" height="40" rx="3" fill="#2a9d5c"/>
  <rect x="222" y="247" width="14" height="26" rx="3" fill="#6ee7b7"/>
  <!-- Screen shine -->
  <rect x="152" y="210" width="96" height="68" rx="10" fill="url(#screenGloss)" opacity="0.15"/>

  <!-- Robot neck -->
  <rect x="182" y="168" width="36" height="24" rx="8" fill="#3ab87a"/>
  <rect x="182" y="168" width="36" height="24" rx="8" fill="none" stroke="#2a9d5c" stroke-width="2"/>

  <!-- Robot head -->
  <rect x="120" y="88" width="160" height="82" rx="24" fill="#4ecb8d"/>
  <rect x="120" y="88" width="160" height="82" rx="24" fill="none" stroke="#2a9d5c" stroke-width="3"/>

  <!-- Antenna -->
  <line x1="200" y1="88" x2="200" y2="58" stroke="#2a9d5c" stroke-width="4" stroke-linecap="round"/>
  <circle cx="200" cy="52" r="10" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="200" cy="52" r="5" fill="#fff" opacity="0.6"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <rect x="144" y="108" width="44" height="34" rx="12" fill="#1a1a2e"/>
  <circle cx="160" cy="125" r="10" fill="#60a5fa"/>
  <circle cx="160" cy="125" r="6" fill="#1d4ed8"/>
  <circle cx="163" cy="122" r="2.5" fill="#fff"/>
  <!-- Right eye -->
  <rect x="212" y="108" width="44" height="34" rx="12" fill="#1a1a2e"/>
  <circle cx="240" cy="125" r="10" fill="#60a5fa"/>
  <circle cx="240" cy="125" r="6" fill="#1d4ed8"/>
  <circle cx="243" cy="122" r="2.5" fill="#fff"/>

  <!-- Smile -->
  <path d="M172 148 Q200 166 228 148" fill="none" stroke="#2a9d5c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arms -->
  <!-- Left arm -->
  <rect x="90" y="200" width="38" height="22" rx="11" fill="#3ab87a" stroke="#2a9d5c" stroke-width="2.5" transform="rotate(-15 109 211)"/>
  <!-- Right arm -->
  <rect x="272" y="200" width="38" height="22" rx="11" fill="#3ab87a" stroke="#2a9d5c" stroke-width="2.5" transform="rotate(15 291 211)"/>

  <!-- Legs -->
  <rect x="155" y="305" width="34" height="44" rx="12" fill="#3ab87a" stroke="#2a9d5c" stroke-width="2.5"/>
  <rect x="211" y="305" width="34" height="44" rx="12" fill="#3ab87a" stroke="#2a9d5c" stroke-width="2.5"/>
  <!-- Feet -->
  <ellipse cx="172" cy="350" rx="20" ry="10" fill="#2a9d5c"/>
  <ellipse cx="228" cy="350" rx="20" ry="10" fill="#2a9d5c"/>

  <!-- Wifi signal top right -->
  <g transform="translate(318, 48)">
    <path d="M0 20 Q14 6 28 20" fill="none" stroke="#2a9d5c" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <path d="M5 28 Q14 18 23 28" fill="none" stroke="#2a9d5c" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <circle cx="14" cy="35" r="3.5" fill="#2a9d5c"/>
  </g>

  <!-- Stars / sparkles -->
  <g fill="#fbbf24" opacity="0.75">
    <polygon points="55,72 58,80 66,80 60,85 62,93 55,88 48,93 50,85 44,80 52,80" transform="scale(0.6) translate(35,55)"/>
    <polygon points="355,300 357,306 363,306 358,310 360,316 355,312 350,316 352,310 347,306 353,306" transform="scale(0.5) translate(360,260)"/>
  </g>

  <!-- Label -->
  <rect x="100" y="358" width="200" height="30" rx="15" fill="#2a9d5c"/>
  <text x="200" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.5">Robot Display</text>

  <defs>
    <linearGradient id="screenGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
